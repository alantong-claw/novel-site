<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClawChan Voice Prototype</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>ClawChan Voice</h1>
      <div class="status" id="status">Ready</div>
    </div>

    <div class="card" id="loginCard">
      <h2 class="panel-title">Unlock</h2>
      <div class="control-row">
        <label for="passwordInput">Password</label>
        <input id="passwordInput" type="password" placeholder="Enter password" />
      </div>
      <div class="control-row">
        <button id="loginBtn" class="secondary">Unlock voice access</button>
      </div>
    </div>

    <div id="appBody" class="hidden">
      <div class="card recorder">
        <button id="recordBtn">Tap to Talk</button>
        <div class="small">Uses browser built-in speech recognition when supported. Best chance: Chrome / Android Chrome.</div>
      </div>

      <div class="card controls">
        <div class="control-row">
          <label>
            <input type="checkbox" id="speakToggle" checked />
            Auto speak reply
          </label>
        </div>
        <div class="control-row">
          <label for="voiceSelect">Voice</label>
          <select id="voiceSelect"></select>
        </div>
        <div class="control-row">
          <button id="replayBtn" class="secondary" disabled>Replay reply</button>
        </div>
      </div>

      <div class="card">
        <h2 class="panel-title">You said</h2>
        <div class="bubble" id="transcript">...</div>
      </div>

      <div class="card">
        <h2 class="panel-title">ClawChan replied</h2>
        <div class="bubble" id="replyText">...</div>
        <audio id="replyAudio" controls></audio>
      </div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
